<ngx-spinner 
    bdColor = "rgba(0, 0, 0, 0.6)"
    size  = "medium" 
    color = "#fff" 
    type  = "timer"
    [fullScreen]="true">
    <p style="color: white" >Моля изчакайте .....</p>
</ngx-spinner>


<h6 class="content">Импорт на файл от Акстър</h6>

<div class="row">
    <div style="margin-top: 5px; margin-bottom: 5px;">                    
        <input nbInput outline  status="primary"
            id="uploadBtn"
            type = "file" 
            style="margin-top: 5px;"
            (change)="importexcel($event)" required >
    </div>   

    <div class="col-sm-8" align = "right" style="padding: 0px;">
        <div fxFlex="100" fxLayoutAlign="end center">
            <button nbButton 
                [disabled]="click"
                (click)="save()">
                Импорт
            </button>
            <button nbButton 
                class="button-next" 
                (click)="back()">
                Назад
            </button>
        </div>                  
    </div>   
</div>   

<div class="div-container">
    <table class="page1">
        <colgroup>
            <col span="1" style="width: 20%;">
            <col span="1" style="width: 20%;">
            <col span="1" style="width: 40%;">
            <col span="1" style="width: 20%;">
        </colgroup>
    
        <thead>
            <tr>
                <th> Номер</th>    
                <th> Дата на Регистрация</th>    
                <th> Кореспондент (1-ви)</th>    
                <th> Относно</th>    
            </tr>
        </thead>        
    
        <tbody>
            <tr *ngFor="let item of dataImport | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize; index as i">
                <td> {{item.nomer}}</td>
                <td> {{item.data}}</td>
                <td> {{item.korespondent}}</td>
                <td> {{item.otnosno}}</td>                                    
            </tr>
        </tbody>  
    </table>
</div>   


<div class="row" *ngIf="dataImport.length > pageSize"  
     style="margin-top: 5px;">
    <div class="col-sm-12" >  
        <ngb-pagination 
                class="d-flex justify-content-end ngb-pagination-custom" 
                [collectionSize]="dataImport.length" 
                [(page)]="page" 
                [pageSize]="pageSize"
                [maxSize]="5" 
                [rotate]="true" 
                [ellipses]="false" 
                [boundaryLinks]="true">
        </ngb-pagination>
    </div>
</div>
