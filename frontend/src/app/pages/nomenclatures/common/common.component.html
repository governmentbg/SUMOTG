<div class="form-header-container">
    <div fxLayout="row" fxLayoutGap="20px">
        <div fxFlex="80" fxLayoutAlign="start center">
            <h6>{{name}}</h6>
        </div>
        
        <div [hidden]="disable" fxFlex="20" fxLayoutAlign="end center">
            <button nbButton 
                    status="primary"
                    (click)="addItem()">
               <nb-icon 
                    icon="plus-outline" 
                    [options]="{ animation: { type: 'zoom' } }">
                </nb-icon>
                    Добави
            </button>
        </div>
    </div>
</div>

<nb-card class="card-container">
    <nb-card-body>
        <div [hidden]="disable">
            <table  class="page1">
                <colgroup>
                    <col span="1" style="width: 10%;">
                    <col span="1" style="width: 70%;">
                    <col span="1" style="width: 10%;">
                    <col span="1" style="width: 5%;">
                    <col span="1" style="width: 5%;">
                </colgroup>

                <thead>
                    <tr>
                        <th> Код </th>    
                        <th> Наименование </th>    
                        <th> Статус </th>    
                        <th> </th>    
                        <th> </th>    
                    </tr>
                </thead>        
                <tbody>
                    <tr *ngFor="let item of items | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize">
                        <td class="tdright" [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.kodpos}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.text}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.status === 1 ? 'Активен' : 'Неактивен'}}
                        </td>
                        <td class="tdcenter">
                            <nb-icon icon="edit-outline" (click)="editItem(item)"></nb-icon>
                        </td>
                        <td class="tdcenter">
                            <nb-icon icon="trash-outline" (click)="removeItem(item)">
                        </nb-icon></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div [hidden]="!disable">
            <table  class="page1">
                <colgroup>
                    <col span="1" style="width: 10%;">
                    <col span="1" style="width: 80%;">
                    <col span="1" style="width: 10%;">
                </colgroup>

                <thead>
                    <tr>
                        <th> Код </th>    
                        <th> Наименование </th>    
                        <th> Статус </th>    
                    </tr>
                </thead>        
                <tbody>
                    <tr *ngFor="let item of items | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize">
                        <td class="tdright" [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.kodpos}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.text}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.status === 1 ? 'Активен' : 'Неактивен'}}
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </nb-card-body>
  </nb-card>

  <div fxLayout="row" fxLayoutGap="20px">
    <div fxFlex="20" fxLayoutAlign="start center">         
        <p><a href="javascript:void(0)" class="text-link" (click)="back()">Назад</a></p>
    </div>

    <div fxFlex="80" fxLayoutAlign="end center">
        <ngb-pagination 
            class="d-flex justify-content-end ngb-pagination-custom" 
            [collectionSize]="items.length" 
            [(page)]="page" 
            [pageSize]="pageSize"
            [rotate]="true" 
            [ellipses]="false" 
            [boundaryLinks]="true">
        </ngb-pagination>
    </div>    
</div>
