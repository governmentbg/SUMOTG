<div class="form-header-container">
    <div class="row col-nopadding justify-content-md-center">
        <div class="col-9 col-nopadding">
            <h6>Адреси от друг екологичен проект</h6>
        </div>

        <div class="col-1 col-nopadding">
            <nb-search 
                type="rotate-layout"
                hint="За търсене натиснете 'ENTER'"
                placeholder="Търсене ...">
            </nb-search>
        </div>

        <div class="col-2" [hidden]="disable">
            <button nbButton 
                    status="primary"
                    (click)="addItem()">
                <nb-icon 
                    icon="plus-outline" 
                    [options]="{ animation: { type: 'zoom' } }">
                </nb-icon>
                    Добави
            </button>
        </div>
    </div>
</div>

<nb-card class="card-container">
    <nb-card-body>
        <div [hidden]="disable">
            <table  class="page1">
                <colgroup>
                    <col span="1" style="width: 3%;">
                    <col span="1" style="width: 80%;">
                    <col span="1" style="width: 10%;">
                    <col span="1" style="width: 4%;">
                    <col span="1" style="width: 4%;">
                </colgroup>

                <thead>
                    <tr>
                        <th> Тип</th>    
                        <th> Описание</th>    
                        <th> Статус </th>    
                        <th> </th>    
                        <th> </th>    
                    </tr>
                </thead>   
                
                <tbody>
                    <tr *ngFor="let item of items | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize">
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.tip}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.opisanie}}
                        </td>
                        <td class="tdcenter" [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.status === 1 ? 'Активен' : 'Неактивен'}}
                        </td>
                        <td class="tdcenter">
                            <nb-icon
                                icon="edit-outline" (click)="editItem(item)">
                            </nb-icon>
                        </td>
                        <td class="tdcenter">
                            <nb-icon
                                icon="trash-outline" (click)="removeItem(item)">
                            </nb-icon>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div [hidden]="!disable">
            <table  class="page1">
                <colgroup>
                    <col span="1" style="width: 3%;">
                    <col span="1" style="width: 87%;">
                    <col span="1" style="width: 10%;">
                </colgroup>

                <thead>
                    <tr>
                        <th> Тип</th>    
                        <th> Описание</th>    
                        <th> Статус </th>    
                    </tr>
                </thead>        

                <tbody>
                    <tr *ngFor="let item of items | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize">
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.tip}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.opisanie}}
                        </td>
                        <td [ngClass]="{'disabledRow' : item.status===0}">
                            {{item.status === 1 ? 'Активен' : 'Неактивен'}}
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>        
    </nb-card-body>
</nb-card>

<div class="row ">
    <div class="col-sm-7  col-nopadding">  
        <button nbButton 
                (click)="exportexcel()"
                status="primary">
                <i class="far fa-file-excel" 
                    style="font-size:16px;color:white;margin-right:3px;">
                </i>
                Експорт
        </button>
    </div>

    <div class="col-sm-5 col-nopadding" align="right">      
        <ngb-pagination 
            class="d-flex justify-content-end ngb-pagination-custom" 
            [collectionSize]="items.length" 
            [(page)]="page" 
            [pageSize]="pageSize"
            [maxSize]="5" 
            [rotate]="true" 
            [ellipses]="false" 
            [boundaryLinks]="true">
        </ngb-pagination>
    </div>    
</div>
