                <div class="col-sm-10" align="left" >  
                    <ngb-pagination 
                        class="d-flex justify-content-left ngb-pagination-custom" 
                        [collectionSize]="itemslength" 
                        [(page)]="page" 
                        [pageSize]="pageSize"
                        [maxSize]="5" 
                        [rotate]="true" 
                        [ellipses]="false" 
                        [boundaryLinks]="true">
                    </ngb-pagination>
                </div>            

                <div class="col-sm-2" align="right">
                    <nb-search 
                        type="modal-move"
                        hint="За търсене натиснете 'ENTER'"
                        placeholder="Търсене ...">
                    </nb-search>
                </div>
            </div>    

            <!-- <div *ngIf = "idporychka === 0 && idmonporychka > 0">
                <div class="col-sm-12" align="right">
                    <nb-search 
                        type="modal-move"
                        hint="За търсене натиснете 'ENTER'"
                        placeholder="Търсене ...">
                    </nb-search>
                </div>
            </div>   -->
        </nb-card-header>
        
        <nb-card-body>
            <div class="dialog-container">
                <div class="row row-distance">
                    <table  class="page1" *ngIf = "isLoaded">
                        <colgroup>
                            <col span="1" style="width: 3%;">
                            <!-- <col span="1" style="width: 7%;"> -->
                            <col span="1" style="width: 10%;">
                            <col span="1" style="width: 20%;">
                            <col span="1" style="width: 10%;">
                            <col span="1" style="width: 25%;">
                            <col span="1" style="width: 25%;"> 
                        </colgroup>

                        <thead>
                            <tr>
                                <th></th>    
                                <th> № ОПОС </th>    
                                <!-- <th> ЕГН </th>     -->
                                <th> Три имена</th>    
                                <th> Вид имот</th>    
                                <th> Уреди за демонтиране</th>    
                                <th> Адрес</th>    
                            </tr>
                        </thead>        
            
                        <tbody>
                            <tr *ngFor="let item of items.controls | formArrayFilterPipe: searchText | slice: (page-1) * pageSize : (page-1) * pageSize + pageSize; index as i">
                                    <td>
                                        <form [formGroup]="item">
                                            <nb-checkbox #checkbox 
                                                status  ="basic" 
                                                formControlName ="ischeck"
                                                (change)="onItemClick(item)">
                                            </nb-checkbox>
                                        </form>                                        
                                    </td>
                                    <td>{{item.get('unom').value}}</td>
                                    <!-- <td>{{item.get('ident').value}}</td> -->
                                    <td>{{item.get('ime').value}}</td>
                                    <td>{{item.get('vidimot').value}}</td>
                                    <td>{{item.get('uredname').value}}</td>
                                    <td>{{item.get('adres').value}}</td>
                            </tr>
                        </tbody>
                    </table>                
                </div>

            </div>
        </nb-card-body>
    
        <nb-card-footer>
            <div align="end">
                <button nbButton 
                        type="button"
                        status="primary"  
                        [disabled]="!EditForm.valid"
                        (click) = "save()">
                    Добави
                </button>
                <button nbButton class="btn-close" status="info" (click)="dismiss()" hero>
                    Затвори
                </button>
            </div>
        </nb-card-footer>    
    </nb-card>

  

</form>
