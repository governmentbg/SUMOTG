<h1 id="title" class="title">Промяна на парола</h1>

<nb-alert *ngIf="showMessages?.error && errors?.length && !submitted" outline="danger" role="alert">
  <p class="alert-title"><b>Грешка!</b></p>
  <ul class="alert-message-list">
    <li *ngFor="let error of errors" class="alert-message">{{ error }}</li>
  </ul>
</nb-alert>

<nb-alert *ngIf="showMessages?.success && messages?.length && !submitted" outline="success" role="alert">
  <p class="alert-title"></p>
  <ul class="alert-message-list">
    <li *ngFor="let message of messages" class="alert-message">{{ message }}</li>
  </ul>
</nb-alert>

<nb-card >
  <nb-card-header>Моля, въведете нова парола </nb-card-header>
  <nb-card-body>  
    <div [formGroup]="resetPasswordForm" 
        class="container-fluid"
        aria-labelledby="title">

        <div class="row row-height justify-content-md-center form-group">
          <label for="input-password"
                 class="col-sm-2 col-form-label">
                  Парола:
          </label>

          <div class="col-sm-6">  
              <input  nbInput
                      autofocus
                      fullWidth
                      id="input-password"
                      formControlName="password"
                      type="password"
                      [status]="password.dirty ? (password.invalid  ? 'danger' : 'success') : ''"
                      class="first"
                      placeholder="Парола">
              <ngx-validation-message label="Парола" 
                [showMinLength]="password?.hasError('minlength') && password.touched"
                [showMaxLength]="password?.hasError('maxlength') && password.touched"
                [showRequired]="password?.errors?.required && password.touched"
                [minLength]="minLength"
                [maxLength]="maxLength">
              </ngx-validation-message>
            </div>
          </div>

        <div class="row row-height justify-content-md-center form-group">
          <label for="input-re-password"
                 class="col-sm-2 col-form-label">
                  Потвърждение на паролата:
          </label>
          <div class="col-sm-6">  
            <input  nbInput
                  fullWidth
                  id="input-re-password"
                  formControlName="confirmPassword"
                  type="password"
                  [status]="confirmPassword.dirty ? (confirmPassword.invalid || password.value !== confirmPassword.value  ? 'danger' : 'success') : ''"
                  placeholder="Парола">
            <ngx-validation-message label="Потвърждаване на парола"
                [showMinLength]="confirmPassword?.hasError('minlength') && confirmPassword.touched"
                [showMaxLength]="confirmPassword?.hasError('maxlength') && confirmPassword.touched"
                [showRequired]="confirmPassword?.errors?.required && confirmPassword.touched"
                [minLength]="minLength"
                [maxLength]="maxLength">
            </ngx-validation-message>
              <p  class="error-message caption status-danger" *ngIf="password.value !== confirmPassword.value && confirmPassword.touched">
                  Несъвпадат двете полета!
              </p>
          </div>
        </div>
    </div>
  </nb-card-body>

  <nb-card-footer>   
    <div class="col-sm-10 btnResetPass" align="right">
      <button nbButton 
        status="info" 
        [disabled]="submitted || !resetPasswordForm.valid || password.value !== confirmPassword.value"
        [class.btn-pulse]="submitted"
        (click)="resetPass()">
        Промяна
      </button>
    </div>
  </nb-card-footer>
</nb-card>

<section class="sign-in-or-up" aria-label="Sign in or sign up">
  <p><a href="javascript:void(0)" class="text-link" (click)="back()">Назад</a></p>
</section>
